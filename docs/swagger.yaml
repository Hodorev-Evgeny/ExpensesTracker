    get:
      description: Получение конкретного пользователя по его ID
      parameters:
      - description: ID получаемого пользователя
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Пользователь успешно найден
          schema:
            $ref: '#/definitions/features_users_transport.UserDTOResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Получение пользователя
      tags:
      - users
    patch:
      consumes:
      - application/json
      description: |-
        Changing information about a user already existing in the system
        ### Logic of updating fields (Three-state logic):
        1. **The field was not passed**: `phone_number` is ignored, the value in the database does not change
        2. **The value** is explicitly passed: `"phone_number": "+711122233344"` - sets a new phone number in the database
        3. **null passed**: `"phone_number": null` - clears the field in the database (set to NULL)
        Restrictions: `full_name` cannot be set as null
      parameters:
      - description: ID of the user being modified
        in: path
        name: id
        required: true
        type: integer
      - description: PatchUser request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/features_users_transport.RequestPatchUser'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully changed user
          schema:
            $ref: '#/definitions/features_users_transport.UserDTOResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Изменение пользователя
      tags:
      - users
  /users/login:
    post:
      description: Create session when user register
      parameters:
      - description: This Body need to login user
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/features_users_transport.LoginHandler'
      produces:
      - application/json
      responses:
        "201":
          description: session created
          schema:
            $ref: '#/definitions/features_users_transport.StatusRequest'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Create session
      tags:
      - users
swagger: "2.0"
