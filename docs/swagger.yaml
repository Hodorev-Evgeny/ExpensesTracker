basePath: /api/v1
definitions:
  github_com_Hodorev-Evgeny_ExpensesTracker_internal_core_transport_http_response.ErrorResponse:
    properties:
      error:
        type: string
      massage:
        type: string
    type: object
  internal_features_category_transport_http.CategoryRequest:
    properties:
      category_name:
        example: Medicine
        maxLength: 20
        minLength: 3
        type: string
      user_id:
        example: 1
        type: integer
    required:
    - category_name
    - user_id
    type: object
  internal_features_category_transport_http.CategoryResponse:
    properties:
      category_name:
        example: Medicine
        type: string
      id:
        example: 4
        type: integer
      user_id:
        example: 1
        type: integer
    type: object
  internal_features_category_transport_http.CategoryUpdateRequest:
    properties:
      title:
        type: string
