        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get all category
      tags:
      - category
    post:
      consumes:
      - application/json
      description: Create new category in database
      parameters:
