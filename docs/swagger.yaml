basePath: /api/v1
definitions:
  github_com_Hodorev-Evgeny_ExpensesTracker_internal_core_transport_http_response.ErrorResponse:
    properties:
      error:
        type: string
      massage:
        type: string
    type: object
  internal_features_category_transport_http.CategoryRequest:
    properties:
      category_name:
        example: Medicine
        maxLength: 20
        minLength: 3
        type: string
      user_id:
        example: 1
        type: integer
    required:
    - category_name
    - user_id
    type: object
  internal_features_category_transport_http.CategoryResponse:
    properties:
      category_name:
        example: Medicine
        type: string
      id:
        example: 4
        type: integer
      user_id:
        example: 1
        type: integer
    type: object
  internal_features_category_transport_http.CategoryUpdateRequest:
    properties:
      title:
        type: string
    required:
    - title
    type: object
  internal_features_limit_transport.LimitDTO:
    properties:
      amount_limit:
        example: 1000
        type: integer
      duration:
        example: "2006-01-02T15:04:05-07:00"
        type: string
    required:
    - amount_limit
    - duration
    type: object
  internal_features_limit_transport.LimitResponse:
    properties:
      amount_limit:
        example: 1000
        type: integer
      duration:
        example: "2006-01-02T15:04:05-07:00"
        type: string
      id:
        type: integer
    required:
    - amount_limit
    - duration
    type: object
  internal_features_limit_transport.PatchLimit:
    properties:
      amount_limit:
        example: 1
        type: integer
      duration:
        example: "2006-01-02T15:04:05-07:00"
        type: string
    type: object
  internal_features_static_transport.StaticResponse:
    properties:
      avg_expenditure:
        example: 632.12
        type: number
      avg_income:
        example: 123.53
        type: number
      cost_category:
        example: Medicine
        type: string
      count_operation:
        example: 6
        type: integer
      difference:
        example: 25
        type: number
      max_expenditure:
        example: 155
        type: integer
      max_income:
        example: 1200
        type: integer
      share_category:
        additionalProperties:
          format: float64
          type: number
        example:
          Medic: 11.6
          Medicine: 12.4
        type: object
      sum_expenditure:
        example: 1230
        type: integer
      sum_income:
        example: 1255
        type: integer
    type: object
  internal_features_transaction_transport.TransactionPatchRequest:
    properties:
      categoryId:
        example: 1
        type: integer
      comments:
        example: comment
        type: string
      sum:
        example: 1023
        type: integer
      typeTransaction:
        example: Expenditure/Income
        type: string
    type: object
  internal_features_transaction_transport.TransactionRequest:
    properties:
      category_id:
        example: 1
        type: integer
      comments:
        example: somthing else
        type: string
      date:
        example: "2006-01-02T15:04:05-07:00"
        type: string
      sum:
        example: 10123
        type: integer
      type:
        example: Expenditure/Income
        type: string
      user_id:
        example: 1
        type: integer
    required:
    - category_id
    - comments
    - date
    - sum
    - type
    - user_id
    type: object
  internal_features_transaction_transport.TransactionResponse:
    properties:
      category_id:
        example: 1
        type: integer
      comments:
        example: somthing else
        type: string
      date:
        example: "2006-01-02T15:04:05-07:00"
        type: string
      id:
        example: 1
        type: integer
      sum:
        example: 10123
        type: integer
      time_change:
        example: "2006-01-02T15:04:05-07:00"
        type: string
      type:
        example: Expenditure/Income
        type: string
      user_id:
        example: 1
        type: integer
    required:
    - category_id
    - comments
    - date
    - sum
    - type
    - user_id
    type: object
  internal_features_users_transport_http.CreateUserRequest:
    properties:
      email:
        example: example@gmail.com
        type: string
      full_name:
        example: John Doe
        maxLength: 32
        minLength: 3
        type: string
      password:
        example: "123456"
        maxLength: 32
        minLength: 8
        type: string
      phone:
        example: "+71124234312"
        maxLength: 11
        minLength: 11
        type: string
    required:
    - email
    - full_name
    - password
    - phone
    type: object
  internal_features_users_transport_http.CreateUserResponse:
    properties:
      email:
        type: string
      full_name:
        type: string
      id:
        type: integer
      phone:
        type: string
      time_add:
        type: string
    type: object
  internal_features_users_transport_http.RequestPatchUser:
    properties:
      email:
        example: example@gmai;.com
        type: string
      full_name:
        example: John Doe
        type: string
      phone:
        example: 555-555-5555
        type: string
    type: object
  internal_features_users_transport_http.UserDTOResponse:
