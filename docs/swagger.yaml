basePath: /api/v1
definitions:
  core_domain.CookieData:
    properties:
      userID:
        type: integer
    type: object
  feature_category_transport.CategoryRequest:
    properties:
      category_name:
        example: Medicine
        maxLength: 20
        minLength: 3
        type: string
      limit_id:
        example: 1
        type: integer
      user_id:
        example: 1
        type: integer
    required:
    - category_name
    - user_id
    type: object
  feature_category_transport.CategoryResponse:
    properties:
      category_name:
        example: Medicine
        type: string
      id:
        example: 4
        type: integer
      limit_id:
        example: 1
        type: integer
      user_id:
        example: 1
        type: integer
    type: object
  feature_category_transport.CategoryUpdateRequest:
    properties:
      limit_id:
        type: integer
      title:
        type: string
    required:
    - limit_id
    - title
    type: object
  feature_transactio_transport.TransactionPatchRequest:
    properties:
      categoryId:
        example: 1
        type: integer
      comments:
        example: comment
        type: string
      sum:
        example: 1023
        type: integer
      typeTransaction:
        example: Expenditure/Income
        type: string
    type: object
  feature_transactio_transport.TransactionRequest:
    properties:
      category_id:
        example: 1
        type: integer
      comments:
        example: somthing else
        type: string
      date:
        example: "2006-01-02T15:04:05-07:00"
        type: string
      sum:
        example: 10123
        type: integer
      type:
        example: Expenditure/Income
        type: string
      user_id:
        example: 1
        type: integer
    required:
    - category_id
    - comments
    - date
    - sum
    - type
    - user_id
    type: object
  feature_transactio_transport.TransactionResponse:
    properties:
      category_id:
        example: 1
        type: integer
      comments:
        example: somthing else
        type: string
      date:
        example: "2006-01-02T15:04:05-07:00"
        type: string
      id:
        example: 1
        type: integer
      sum:
        example: 10123
        type: integer
      time_change:
        example: "2006-01-02T15:04:05-07:00"
        type: string
      type:
        example: Expenditure/Income
        type: string
      user_id:
        example: 1
        type: integer
    required:
    - category_id
    - comments
    - date
    - sum
    - type
    - user_id
    type: object
  feature_transport_limit.LimitDTO:
    properties:
      amount_limit:
        example: 1000
        type: integer
      duration:
        example: "2006-01-02T15:04:05-07:00"
        type: string
    required:
    - amount_limit
    - duration
    type: object
  feature_transport_limit.LimitResponse:
    properties:
      amount_limit:
        example: 1000
        type: integer
      duration:
        example: "2006-01-02T15:04:05-07:00"
        type: string
      id:
        type: integer
    required:
    - amount_limit
    - duration
    type: object
  feature_transport_limit.PatchLimit:
    properties:
      amount_limit:
        example: 1
        type: integer
      duration:
        example: "2006-01-02T15:04:05-07:00"
        type: string
    type: object
  feature_transport_static.StaticResponse:
    properties:
      avg_expenditure:
        example: 632.12
        type: number
      avg_income:
        example: 123.53
        type: number
      cost_category:
        example: Medicine
        type: string
      count_operation:
        example: 6
        type: integer
      difference:
        example: 25
        type: number
      max_expenditure:
        example: 155
        type: integer
      max_income:
        example: 1200
        type: integer
      share_category:
        additionalProperties:
          format: float64
          type: number
        example:
          Medic: 11.6
          Medicine: 12.4
        type: object
      sum_expenditure:
        example: 1230
        type: integer
      sum_income:
        example: 1255
        type: integer
    type: object
  features_users_transport.CreateUserRequest:
    properties:
      email:
        example: example@gmail.com
        type: string
      full_name:
        example: John Doe
        maxLength: 32
        minLength: 3
        type: string
      password:
        example: "123456"
        maxLength: 32
        minLength: 8
        type: string
      phone:
        example: "+71124234312"
        maxLength: 11
        minLength: 11
        type: string
    required:
    - email
    - full_name
    - password
    - phone
    type: object
  features_users_transport.CreateUserResponse:
    properties:
      email:
        type: string
      full_name:
        type: string
      id:
        type: integer
      phone:
        type: string
      time_add:
        type: string
    type: object
  features_users_transport.LoginHandler:
    properties:
      email:
        type: string
      full_name:
        type: string
      password:
        type: string
    type: object
  features_users_transport.RequestPatchUser:
    properties:
      email:
        example: example@gmai;.com
        type: string
      full_name:
        example: John Doe
        type: string
      phone:
        example: 555-555-5555
        type: string
    type: object
  features_users_transport.StatusRequest:
    properties:
      status:
        type: string
    type: object
  features_users_transport.UserDTOResponse:
    properties:
      email:
        type: string
      full_name:
        type: string
      id:
        type: integer
      phone:
        type: string
      time_add:
        type: string
    type: object
  response.ErrorResponse:
    properties:
      error:
        type: string
      massage:
        type: string
    type: object
host: 127.0.0.1:8080
info:
  contact: {}
  description: This server help you tracker money
  title: ExpensesTracker
  version: "0.7"
paths:
  /category:
    get:
