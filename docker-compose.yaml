services:
  tracker-app:
    env_file:
      - .env
    build:
      context: .
      dockerfile: cmd/trackerapp/Dockerfile
    container_name: "main-app"
    ports:
      - "8080:8080"
    depends_on:
      data-base:
        condition: service_healthy

  data-base:
    image: postgres:18.3-bookworm
    container_name: "DataBase"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis-db:
    image: redis:8.2.6-bookworm
    container_name: RedisDB
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - ${PROJECT_ROOT}/out/redisdata:/data
    restart: always

  forwarder-port-redis:
    image: alpine/socat:1.8.0.3
    container_name: expanses-tracker-redis-forwarder-port
    command: "tcp-listen:6379,fork,reuseaddr tcp-connect:redis-db:6379"
    ports:
      - "127.0.0.1:6379:6379"

  migrate:
    image: migrate/migrate:v4.19.1
    container_name: migrate-container
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations

  forwarder-port:
    image: alpine/socat:1.8.0.3
    container_name: expanses-tracker-postgres-forwarder-port
    command: "tcp-listen:5432,fork,reuseaddr tcp-connect:data-base:5432"
    ports:
      - "127.0.0.1:5432:5432"

  swagger:
    build:
      context: ${PROJECT_ROOT}
      dockerfile_inline: |
        FROM golang:1.26.1-alpine
        RUN apk add --no-cache git
        RUN go install github.com/swaggo/swag/cmd/swag@v1.16.6
        WORKDIR /code
        ENTRYPOINT ["swag"]
    volumes:
      - ${PROJECT_ROOT}:/code