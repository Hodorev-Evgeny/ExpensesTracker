<!doctype html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — Expenses Tracker</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .auth-page { min-height: 100vh; display: grid; place-items: center; padding: 32px 16px; }
    .auth-card { width: min(560px, 100%); border: 1px solid var(--line); border-radius: 32px; background: rgba(255,255,255,.92); box-shadow: var(--shadow); padding: 36px; }
    [data-theme="dark"] .auth-card { background: rgba(17, 24, 39, .92); }
    .auth-header { margin-bottom: 28px; }
    .auth-kicker { margin: 0 0 10px; color: var(--primary); font-size: 13px; font-weight: 900; letter-spacing: .22em; text-transform: uppercase; }
    .auth-header h1 { margin: 0 0 10px; font-size: clamp(34px, 5vw, 52px); line-height: 1; }
    .auth-header p { margin: 0; color: var(--muted); font-size: 18px; }
    .auth-form { display: grid; gap: 18px; }
    .auth-actions { display: flex; gap: 12px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
    .auth-message { display: none; margin-top: 18px; padding: 14px 16px; border-radius: 18px; font-weight: 700; }
    .auth-message.is-success { display: block; color: #166534; background: #dcfce7; }
    .auth-message.is-error { display: block; color: #991b1b; background: #fee2e2; }
    [data-theme="dark"] .auth-message.is-success { color: #bbf7d0; background: rgba(34,197,94,.18); }
    [data-theme="dark"] .auth-message.is-error { color: #fecaca; background: rgba(239,68,68,.18); }
    @media (max-width: 640px) { .auth-card { padding: 26px; border-radius: 24px; } .auth-actions .btn { width: 100%; } }
  </style>
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-header">
        <p class="auth-kicker">Expenses Tracker</p>
        <h1>Вход</h1>
        <p>Войдите в аккаунт, чтобы открыть личные расходы.</p>
      </div>

      <form class="auth-form" id="loginForm">
        <div class="field">
          <label for="email">Email *</label>
          <input id="email" name="email" type="email" placeholder="example@mail.ru" autocomplete="email" required />
        </div>

        <div class="field">
          <label for="fullName">Имя, если требуется backend</label>
          <input id="fullName" name="full_name" type="text" placeholder="Можно оставить пустым" autocomplete="name" />
        </div>

        <div class="field">
          <label for="password">Пароль *</label>
          <input id="password" name="password" type="password" placeholder="Введите пароль" autocomplete="current-password" required />
        </div>

        <div class="auth-actions">
          <button class="btn btn-primary" type="submit" id="loginBtn">Войти</button>
          <a class="btn btn-secondary" href="/register">Регистрация</a>
          <a class="btn btn-ghost" href="/">На главную</a>
        </div>
      </form>

      <div class="auth-message" id="loginMessage"></div>
    </section>
  </main>

  <script type="module" src="/js/login.js?v=11"></script>
</body>
</html>
